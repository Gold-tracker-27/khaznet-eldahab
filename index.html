<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خزنة الدهب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400..700&family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14120F;
    --ink-soft:#1E1B16;
    --ink-softer:#26221B;
    --brass:#B8863B;
    --brass-light:#E8C77E;
    --parchment:#EDE6D6;
    --parchment-dim:#B9B2A0;
    --moss:#3FAE63;
    --rust:#DD4B3E;
    --line: rgba(232,199,126,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(184,134,59,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(232,199,126,0.06), transparent 55%),
      var(--ink);
    color:var(--parchment);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    padding:32px 18px 80px;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; direction:ltr; unicode-bidi:isolate; }
  .wrap{ max-width:880px; margin:0 auto; }

  /* ---------- Header / Hero ---------- */
  header{ text-align:center; margin-bottom:34px; }
  .eyebrow{
    font-size:12.5px; letter-spacing:.14em; color:var(--brass-light);
    text-transform:uppercase; margin-bottom:10px; opacity:.85;
  }
  h1{
    font-family:'Reem Kufi', sans-serif;
    font-size:clamp(30px,6vw,44px);
    margin:0;
    color:var(--parchment);
    letter-spacing:.01em;
  }
  .logo-row{ display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px; }
  .ingot-icon{ filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5)); transform:rotate(-4deg); }
  .hero-card{
    background:linear-gradient(180deg, var(--ink-soft), var(--ink-softer));
    border:1px solid var(--line);
    border-radius:22px;
    padding:26px 20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    position:relative;
    overflow:hidden;
  }
  .hero-card::before{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(115deg, transparent 0 38px, rgba(232,199,126,0.025) 38px 39px);
    pointer-events:none;
  }
  .hero-stat{ text-align:center; padding:6px 4px; }
  .hero-stat .label{ font-size:12px; color:var(--parchment-dim); margin-bottom:8px; }
  .hero-stat .value{ font-family:'Reem Kufi', sans-serif; font-size:clamp(18px,4vw,26px); }
  .hero-stat .value.mono{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .divider-v{ width:1px; background:var(--line); }
  .gain{ color:var(--moss); }
  .loss{ color:var(--rust); }
  .pct{ font-size:12.5px; opacity:.85; }
  .derived-row{ display:flex; gap:10px; margin-top:10px; }
  .derived-chip{
    flex:1; background:var(--ink); border:1px solid var(--line); border-radius:12px;
    padding:8px 10px; text-align:center;
  }
  .derived-chip .k{ font-size:11px; color:var(--parchment-dim); }
  .derived-chip .v{ font-family:'IBM Plex Mono',monospace; color:var(--brass-light); font-size:14px; direction:ltr; }

  /* ---------- Sections ---------- */
  section{ margin-top:34px; }
  .section-title{
    font-family:'Reem Kufi', sans-serif;
    font-size:20px; margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .section-title::after{
    content:"";
    flex:1; height:0; align-self:center;
    border-top:2px dotted var(--brass);
    opacity:.5;
  }

  /* ---------- Price panel ---------- */
  .price-panel{
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  }
  .price-input{
    background:var(--ink-soft); border:1px solid var(--line);
    border-radius:14px; padding:12px 12px;
  }
  .price-input label{ display:block; font-size:12.5px; color:var(--parchment-dim); margin-bottom:6px; }
  .price-input .row{ display:flex; align-items:center; gap:6px; }
  .price-input input{
    width:100%; background:transparent; border:none; outline:none;
    color:var(--brass-light); font-family:'IBM Plex Mono',monospace; font-size:16px;
    direction:ltr; text-align:left;
  }
  .unit{ font-size:11.5px; color:var(--parchment-dim); white-space:nowrap; }
  .price-updated{ font-size:11px; color:var(--parchment-dim); margin-top:10px; text-align:center; }

  /* ---------- Form ---------- */
  form.add-form{
    background:var(--ink-soft); border:1px solid var(--line);
    border-radius:18px; padding:18px; display:grid; gap:12px;
    grid-template-columns:1fr 1fr;
  }
  form.add-form .full{ grid-column:1/-1; }
  .field label{ display:block; font-size:12.5px; color:var(--parchment-dim); margin-bottom:6px; }
  .field input, .field select{
    width:100%; background:var(--ink); border:1px solid var(--line);
    border-radius:10px; padding:10px 12px; color:var(--parchment);
    font-family:'Tajawal', sans-serif; font-size:14.5px; outline:none;
  }
  .field input.mono, .field select.mono{ font-family:'IBM Plex Mono',monospace; direction:ltr; text-align:left; }
  .field input:focus, .field select:focus, .price-input:focus-within{ border-color:var(--brass); }
  .submit-btn{
    grid-column:1/-1; background:var(--brass); color:var(--ink);
    border:none; border-radius:12px; padding:13px; font-size:15px;
    font-family:'Tajawal', sans-serif; font-weight:700; cursor:pointer;
    transition:filter .15s ease, transform .15s ease;
  }
  .submit-btn:hover{ filter:brightness(1.08); }
  .submit-btn:active{ transform:scale(0.99); }

  /* ---------- Item cards (hallmark) ---------- */
  .items{ display:grid; gap:12px; }
  .item-card{
    background:var(--ink-soft); border:1px solid var(--line);
    border-radius:18px; padding:16px; display:flex; align-items:center; gap:16px;
    position:relative;
  }
  .stamp{
    flex:0 0 auto; width:58px; height:58px; border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.18), transparent 45%),
      conic-gradient(from 200deg, #C9964B, #8F6A2C, #C9964B);
    border:2px solid var(--brass-light);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.45), inset 0 -2px 3px rgba(255,255,255,0.12), 0 2px 6px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    transform:rotate(-3deg);
  }
  .stamp .k{ font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--ink); font-size:15px; text-shadow:0 1px 0 rgba(255,255,255,0.25); }
  .item-body{ flex:1; min-width:0; }
  .item-name{ font-size:15.5px; font-weight:700; margin-bottom:2px; }
  .item-meta{ font-size:12.5px; color:var(--parchment-dim); }
  .item-numbers{ text-align:left; flex:0 0 auto; }
  .item-numbers .current{ font-family:'IBM Plex Mono',monospace; font-size:16px; direction:ltr; }
  .item-numbers .delta{ font-size:12px; margin-top:2px; font-family:'IBM Plex Mono',monospace; direction:ltr; }
  .del-btn{
    flex:0 0 auto; background:none; border:none; color:var(--parchment-dim);
    cursor:pointer; font-size:18px; padding:4px 6px; border-radius:8px;
    transition:color .15s ease, background .15s ease;
  }
  .del-btn:hover{ color:var(--rust); background:rgba(221,75,62,0.1); }
  .sell-btn:hover{ color:var(--moss); background:rgba(63,174,99,0.12); }

  .empty{
    text-align:center; padding:36px 16px; color:var(--parchment-dim);
    border:1px dashed var(--line); border-radius:18px; font-size:14px;
  }
  .empty .big{ font-family:'Reem Kufi',sans-serif; font-size:19px; color:var(--brass-light); margin-bottom:6px; }

  .loading{ text-align:center; padding:60px 10px; color:var(--parchment-dim); font-size:14px; }

  /* ---------- Chart ---------- */
  .chart-card{
    background:var(--ink-soft); border:1px solid var(--line);
    border-radius:18px; padding:18px 16px 10px;
  }
  .chart-legend{ display:flex; gap:18px; justify-content:center; margin-bottom:6px; font-size:12px; color:var(--parchment-dim); }
  .chart-legend .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-inline-end:5px; vertical-align:middle; }
  .chart-legend .dot.invested{ background:var(--parchment-dim); }
  .chart-legend .dot.current{ background:var(--brass-light); }
  .chart-empty{ text-align:center; padding:26px 10px; color:var(--parchment-dim); font-size:13.5px; }
  .charts-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .donut-wrap{ display:flex; align-items:center; gap:16px; justify-content:center; }
  .donut-legend{ font-size:12px; color:var(--parchment-dim); }
  .donut-legend .row{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .donut-legend .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  @media(max-width:640px){ .charts-grid{ grid-template-columns:1fr; } }

  footer{ text-align:center; margin-top:40px; font-size:11.5px; color:var(--parchment-dim); }

  /* ---------- Auth ---------- */
  .auth-gate{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:60px 20px; gap:16px;
  }
  .auth-gate p{ color:var(--parchment-dim); font-size:14px; max-width:360px; margin:0; }
  .google-btn{
    display:flex; align-items:center; gap:10px; background:var(--parchment);
    color:#1E1B16; border:none; border-radius:12px; padding:12px 22px;
    font-family:'Tajawal', sans-serif; font-size:15px; font-weight:700; cursor:pointer;
    transition:transform .15s ease, filter .15s ease;
  }
  .google-btn:hover{ filter:brightness(0.96); }
  .google-btn:active{ transform:scale(0.98); }
  .user-bar{
    display:none; align-items:center; justify-content:space-between;
    background:var(--ink-soft); border:1px solid var(--line); border-radius:14px;
    padding:9px 14px; margin-bottom:24px; font-size:13px;
  }
  .user-bar .who{ display:flex; align-items:center; gap:8px; }
  .user-bar img{ width:26px; height:26px; border-radius:50%; }
  .user-bar .signout{
    background:none; border:1px solid var(--line); color:var(--parchment-dim);
    border-radius:8px; padding:5px 11px; font-size:12px; cursor:pointer; font-family:'Tajawal', sans-serif;
  }
  .user-bar .signout:hover{ color:var(--rust); border-color:var(--rust); }

  @media(max-width:520px){
    form.add-form{ grid-template-columns:1fr; }
    .price-panel{ grid-template-columns:1fr; }
    .hero-card{ grid-template-columns:1fr; gap:16px; }
    .divider-v{ display:none; }
    .item-card{ flex-wrap:wrap; }
    .item-numbers{ margin-inline-start:auto; }
  }
</style>
</head>
<body>

  <header>
    <div class="eyebrow">دفتر الادخار الشخصي</div>
    <div class="logo-row">
      <svg class="ingot-icon" viewBox="0 0 64 40" width="46" height="29">
        <defs>
          <linearGradient id="ingotFace" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#F1D48F"/>
            <stop offset="55%" stop-color="#C9964B"/>

          </linearGradient>

      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.09-1.8 2.73v2.27h2.92c1.71-1.57 2.68-3.88 2.68-6.64z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.27c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.34C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.97 10.71a5.4 5.4 0 010-3.42V4.95H.96a9 9 0 000 8.1l3.01-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.95l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
      تسجيل الدخول بحساب جوجل
    </button>
  </div>

  <div id="app"></div>

  <footer>بياناتك محفوظة على حسابك في جوجل، ومحدش شايفها غيرك.</footer>
</div>

<script>
// ⚠️ حط هنا بيانات مشروع Firebase بتاعك (من إعدادات المشروع في console.firebase.google.com)
const firebaseConfig = {
  apiKey: "AIzaSyAwJxtT93cJ3APwmNGe8EFugib_gXvtTYM",
  authDomain: "khaznet-eldahab.firebaseapp.com",
  projectId: "khaznet-eldahab",
  storageBucket: "khaznet-eldahab.firebasestorage.app",
  messagingSenderId: "413879065503",
  appId: "1:413879065503:web:b165cc07ee364ba6a4bbaa"
};
firebase.initializeApp(firebaseConfig);
let auth, db, firebaseReady = false;
try{
  auth = firebase.auth();
  db = firebase.firestore();
  firebaseReady = true;
}catch(e){
  console.error('Firebase failed to initialize', e);
}
let currentUser = null;
</script>
<script>
const KARATS = [24, 21, 18];
const KARAT_FACTOR = { 24: 1, 21: 0.875, 18: 0.75 };
// ⚠️ حط هنا الـ UID بتاعك من Firebase Authentication > Users، عشان بس إنت تقدر تغيّر السعر
const OWNER_UID = "b6eahZi0wDNLX3BLT0iOk9ljYPj1";
let items = [];
let prices = { 24: '', updatedAt: null };
let history = []; // [{date:'YYYY-MM-DD', invested, current}]
let priceHistory = []; // [{date:'YYYY-MM-DD', p24}]
let sellingId = null;
let loaded = false;

const fmt = n => new Intl.NumberFormat('en-US', {maximumFractionDigits:0}).format(Math.round(n));
const fmt2 = n => new Intl.NumberFormat('en-US', {maximumFractionDigits:2, minimumFractionDigits:2}).format(n);
const fmtPct = n => (n>0?'+':'') + n.toFixed(1) + '%';

async function loadData(){
  if(!currentUser) return;
  try{
    const doc = await db.collection('vaults').doc(currentUser.uid).get();
    if(doc.exists){
      const d = doc.data();
      items = d.items || [];
      history = d.history || [];
    } else {
      items = []; history = [];
    }
  }catch(e){
    console.error('load failed', e);
    items = []; history = [];
  }
  loaded = true;
  attachPriceListener();
  render();
}

let priceListenerAttached = false;
function attachPriceListener(){
  if(priceListenerAttached) return;
  priceListenerAttached = true;
  db.collection('public').doc('goldPrice').onSnapshot(doc => {
    if(doc.exists){
      const d = doc.data();
      prices = { 24: (d.p24 ?? ''), updatedAt: d.updatedAt || null };
      priceHistory = d.history || [];
    } else {
      prices = { 24: '', updatedAt: null };
      priceHistory = [];
    }
    if(loaded){
      snapshotHistory();
      persist();
      render();
    }
  }, err => console.error('price listener failed', err));
}

async function persist(){
  if(!currentUser) return;
  try{
    await db.collection('vaults').doc(currentUser.uid).set({ items, history });
  }catch(e){ console.error('save failed', e); }
}

async function persistPrice(){
  if(!currentUser || currentUser.uid !== OWNER_UID) return;
  const num = parseFloat(prices[24]);
  try{
    await db.collection('public').doc('goldPrice').set({
      p24: isNaN(num) ? null : num,
      updatedAt: prices.updatedAt,
      history: priceHistory
    });
  }catch(e){ console.error('price save failed', e); }
}

function snapshotHistory(){
  const t = computeTotals();
  const today = new Date().toISOString().slice(0,10);
  if(history.length && history[history.length-1].date === today){
    history[history.length-1].invested = t.invested;
    history[history.length-1].current = t.current;
  } else {
    history.push({ date: today, invested: t.invested, current: t.current });
  }
  if(history.length > 365) history = history.slice(history.length-365);
}
function snapshotPriceHistory(){
  const val = parseFloat(prices[24]);
  if(isNaN(val)) return;
  const today = new Date().toISOString().slice(0,10);
  if(priceHistory.length && priceHistory[priceHistory.length-1].date === today){
    priceHistory[priceHistory.length-1].p24 = val;
  } else {
    priceHistory.push({ date: today, p24: val });
  }
  if(priceHistory.length > 365) priceHistory = priceHistory.slice(priceHistory.length-365);
}

function signIn(){
  if(!firebaseReady){ alert('خدمة تسجيل الدخول مش شغالة دلوقتي، تأكد من اتصال الإنترنت وجرب تاني.'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert('حصل خطأ في تسجيل الدخول: ' + e.message));
}
function signOutUser(){
  if(firebaseReady) auth.signOut();
}
if(firebaseReady){
  auth.onAuthStateChanged(async user => {
    currentUser = user;
    const gate = document.getElementById('auth-gate');
    const bar = document.getElementById('user-bar');
    const app = document.getElementById('app');
    if(user){
      gate.style.display = 'none';
      bar.style.display = 'flex';
      document.getElementById('user-name').textContent = user.displayName || user.email || '';
      document.getElementById('user-photo').src = user.photoURL || '';
      app.innerHTML = '<div class="loading">جارِ فتح الخزنة…</div>';
      await loadData();
    } else {
      gate.style.display = 'flex';
      bar.style.display = 'none';
      app.innerHTML = '';
      loaded = false;
    }
  });
} else {
  const gate = document.getElementById('auth-gate');
  if(gate){
    gate.innerHTML = '<p style="color:var(--rust)">تعذر تحميل خدمة تسجيل الدخول من جوجل. تأكد من اتصال الإنترنت عندك وجرب تحدّث الصفحة، أو جرب متصفح تاني.</p>';
  }
}

function currentPriceFor(karat){
  const base = parseFloat(prices[24]);
  if(isNaN(base)) return null;
  return base * KARAT_FACTOR[karat];
}

function computeTotals(){
  let invested = 0, current = 0, unknown = 0;
  items.filter(it=>!it.sold).forEach(it=>{
    invested += it.purchasePrice;
    const p = currentPriceFor(it.karat);
    if(p !== null) current += p * it.weight;
    else unknown++;
  });
  const gain = current - invested;
  const pct = invested > 0 ? (gain / invested) * 100 : 0;
  return { invested, current, gain, pct, unknown };
}

function computeRealized(){
  let cost = 0, proceeds = 0;
  const sold = items.filter(it=>it.sold);
  sold.forEach(it=>{ cost += it.purchasePrice; proceeds += it.sold.price; });
  const gain = proceeds - cost;
  const pct = cost > 0 ? (gain / cost) * 100 : 0;
  return { cost, proceeds, gain, pct, count: sold.length };
}

function timeAgo(iso){
  if(!iso) return 'لسه ما اتسجلش سعر';
  const d = new Date(iso);
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  let h = d.getHours();
  const ampm = h >= 12 ? 'م' : 'ص';
  h = h % 12; if(h === 0) h = 12;
  const mm = d.getMinutes().toString().padStart(2,'0');
  const exact = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} — ${h}:${mm} ${ampm}`;

  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs/60000);
  let rel;
  if(mins < 1) rel = 'دلوقتي';
  else if(mins < 60) rel = 'من ' + mins + ' دقيقة';
  else if(mins < 1440) rel = 'من ' + Math.floor(mins/60) + ' ساعة';
  else rel = 'من ' + Math.floor(mins/1440) + ' يوم';

  return `آخر تحديث: ${exact} (${rel})`;
}

function buildChartSVG(){
  const w = 760, h = 220, padL = 44, padR = 14, padT = 16, padB = 28;
  const innerW = w - padL - padR, innerH = h - padT - padB;

  const allVals = history.flatMap(p => [p.invested, p.current]);
  let min = Math.min(...allVals), max = Math.max(...allVals);
  if(min === max){ min -= 1; max += 1; }
  const pad = (max-min)*0.1;
  min -= pad; max += pad;

  const x = i => padL + (history.length===1 ? innerW/2 : (i/(history.length-1))*innerW);
  const y = v => padT + innerH - ((v-min)/(max-min))*innerH;

  const pathFor = key => history.map((p,i)=> (i===0?'M':'L') + x(i).toFixed(1) + ',' + y(p[key]).toFixed(1)).join(' ');

  const gridLines = [0,1,2,3].map(i=>{
    const gy = padT + (innerH/3)*i;
    const val = max - ((max-min)/3)*i;
    return `<line x1="${padL}" y1="${gy}" x2="${w-padR}" y2="${gy}" stroke="var(--line)" stroke-width="1"/>
            <text x="${padL-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="var(--parchment-dim)" font-family="IBM Plex Mono, monospace">${fmt(val)}</text>`;
  }).join('');

  const firstDate = history[0].date, lastDate = history[history.length-1].date;

  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible;font-family:'IBM Plex Mono',monospace;">
      ${gridLines}
      <path d="${pathFor('invested')}" fill="none" stroke="var(--parchment-dim)" stroke-width="1.6" stroke-dasharray="4 3"/>
      <path d="${pathFor('current')}" fill="none" stroke="var(--brass-light)" stroke-width="2.4"/>
      ${history.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.current)}" r="${i===history.length-1?3.5:2}" fill="var(--brass-light)"/>`).join('')}
      <text x="${padL}" y="${h-6}" font-size="10" fill="var(--parchment-dim)">${firstDate}</text>
      <text x="${w-padR}" y="${h-6}" text-anchor="end" font-size="10" fill="var(--parchment-dim)">${lastDate}</text>
    </svg>
  `;
}

function buildAllocationDonut(){
  const sums = {24:0, 21:0, 18:0};
  items.filter(it=>!it.sold).forEach(it=>{
    const p = currentPriceFor(it.karat);
    if(p !== null) sums[it.karat] += p * it.weight;
  });
  const total = sums[24] + sums[21] + sums[18];
  if(total <= 0) return null;
  const colors = {24:'var(--brass-light)', 21:'var(--brass)', 18:'var(--moss)'};
  const r=48, cx=60, cy=60, circumference = 2*Math.PI*r;
  let offset = 0;
  const segments = [24,21,18].map(k=>{
    const frac = sums[k]/total;
    const dash = frac*circumference;
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[k]}" stroke-width="16" stroke-dasharray="${dash.toFixed(1)} ${(circumference-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
    return s;
  }).join('');
  const legend = [24,21,18].map(k=>`
    <div class="row"><span class="dot" style="background:${colors[k]}"></span>عيار ${k} — ${fmt(sums[k])} ج.م (${((sums[k]/total)*100).toFixed(0)}%)</div>
  `).join('');
  return `
    <div class="donut-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">${segments}</svg>
      <div class="donut-legend">${legend}</div>
    </div>
  `;
}

function buildItemsBarChart(){
  const rows = items.filter(it=>!it.sold).map(it=>{
    const p = currentPriceFor(it.karat);
    return { name: it.name, invested: it.purchasePrice, current: p !== null ? p*it.weight : null };
  }).filter(r => r.current !== null).sort((a,b)=>b.current-a.current).slice(0,6);
  if(rows.length === 0) return null;
  const maxVal = Math.max(...rows.flatMap(r=>[r.invested, r.current])) || 1;
  const barMax = 130;
  return rows.map(r=>{
    const iw = (r.invested/maxVal)*barMax, cw = (r.current/maxVal)*barMax;
    return `
      <div style="margin-bottom:11px;">
        <div style="font-size:12px;color:var(--parchment-dim);margin-bottom:4px;">${escapeHtml(r.name)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <div style="width:${iw}px;height:7px;background:var(--parchment-dim);border-radius:4px;"></div>
          <span class="mono" style="font-size:10px;color:var(--parchment-dim);">${fmt(r.invested)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:${cw}px;height:7px;background:var(--brass-light);border-radius:4px;"></div>
          <span class="mono" style="font-size:10px;color:var(--brass-light);">${fmt(r.current)}</span>
        </div>
      </div>
    `;
  }).join('');
}

function buildPriceChartSVG(){
  const w = 760, h = 200, padL = 44, padR = 14, padT = 16, padB = 28;
  const innerW = w - padL - padR, innerH = h - padT - padB;

  const rows = priceHistory;
  let min = Math.min(...rows.map(r=>r.p24)), max = Math.max(...rows.map(r=>r.p24));
  if(min === max){ min -= 1; max += 1; }
  const pad = (max-min)*0.15;
  min -= pad; max += pad;

  const x = i => padL + (rows.length===1 ? innerW/2 : (i/(rows.length-1))*innerW);
  const y = v => padT + innerH - ((v-min)/(max-min))*innerH;
  const path = rows.map((r,i)=> (i===0?'M':'L') + x(i).toFixed(1) + ',' + y(r.p24).toFixed(1)).join(' ');

  const gridLines = [0,1,2,3].map(i=>{
    const gy = padT + (innerH/3)*i;
    const val = max - ((max-min)/3)*i;
    return `<line x1="${padL}" y1="${gy}" x2="${w-padR}" y2="${gy}" stroke="var(--line)" stroke-width="1"/>
            <text x="${padL-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="var(--parchment-dim)" font-family="IBM Plex Mono, monospace">${fmt2(val)}</text>`;
  }).join('');

  const firstDate = rows[0].date, lastDate = rows[rows.length-1].date;

  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" style="overflow:visible;font-family:'IBM Plex Mono',monospace;">
      ${gridLines}
      <path d="${path}" fill="none" stroke="var(--brass-light)" stroke-width="2.4"/>
      ${rows.map((r,i)=>`<circle cx="${x(i)}" cy="${y(r.p24)}" r="${i===rows.length-1?3.5:2}" fill="var(--brass-light)"/>`).join('')}
      <text x="${padL}" y="${h-6}" font-size="10" fill="var(--parchment-dim)">${firstDate}</text>
      <text x="${w-padR}" y="${h-6}" text-anchor="end" font-size="10" fill="var(--parchment-dim)">${lastDate}</text>
    </svg>
  `;
}

function render(){
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = '<div class="loading">جارِ فتح الدفتر…</div>'; return; }

  const t = computeTotals();
  const gainClass = t.gain > 0 ? 'gain' : (t.gain < 0 ? 'loss' : '');
  const gainSign = t.gain > 0 ? '+' : '';

  let html = '';

  // Quick-add shortcut (top corner)
  html += `
    <div style="display:flex; justify-content:flex-end; margin-bottom:14px;">
      <button class="submit-btn" style="flex:0 0 auto; padding:10px 18px; font-size:13.5px;" onclick="document.getElementById('add-section').scrollIntoView({behavior:'smooth', block:'start'})">+ إضافة قطعة جديدة</button>
    </div>
  `;

  // Chart
  html += `
    <section>
      <div class="section-title">تطور المحفظة</div>
      <div class="chart-card">
        ${history.length >= 2 ? `
          <div class="chart-legend">
            <span><span class="dot invested"></span>اللي اتصرف</span>
            <span><span class="dot current"></span>القيمة الحالية</span>
          </div>
          ${buildChartSVG()}
        ` : `<div class="chart-empty">الرسم البياني هيبان أول ما يكون عندك نقطتين على الأقل — سجّل قطعة أو حدّث السعر في يوم تاني وهيترسم تلقائيًا</div>`}
      </div>
    </section>
  `;

  // Price trend chart
  html += `
    <section>
      <div class="section-title">اتجاه سعر الجرام (عيار 24)</div>
      <div class="chart-card">
        ${priceHistory.length >= 2 ? buildPriceChartSVG() : `<div class="chart-empty">هيبان أول ما تسجّل سعر عيار 24 في يومين مختلفين على الأقل</div>`}
      </div>
    </section>
  `;

  // Allocation + per-item charts
  const donut = buildAllocationDonut();
  const bars = buildItemsBarChart();
  if(donut || bars){
    html += `<section><div class="charts-grid">`;
    html += `
      <div class="chart-card">
        <div class="section-title" style="margin-bottom:12px;">توزيع المحفظة حسب العيار</div>
        ${donut ? donut : '<div class="chart-empty">محتاج سعر العيار الأساسي الأول</div>'}
      </div>
      <div class="chart-card">
        <div class="section-title" style="margin-bottom:12px;">مقارنة القطع (الأعلى قيمة)</div>
        ${bars ? bars : '<div class="chart-empty">محتاج سعر العيار الأساسي الأول</div>'}
      </div>
    `;
    html += `</div></section>`;
  }

  // Hero
  html += `
    <section>
    <div class="hero-card">
      <div class="hero-stat">
        <div class="label">إجمالي المصروف</div>
        <div class="value mono">${fmt(t.invested)} <span style="font-size:13px">ج.م</span></div>
      </div>
      <div class="divider-v"></div>
      <div class="hero-stat">
        <div class="label">القيمة الحالية${t.unknown ? ' *' : ''}</div>
        <div class="value mono">${fmt(t.current)} <span style="font-size:13px">ج.م</span></div>
      </div>
      <div class="divider-v"></div>
      <div class="hero-stat">
        <div class="label">الفرق</div>
        <div class="value mono ${gainClass}">${gainSign}${fmt(t.gain)} <span style="font-size:13px">ج.م</span></div>
        <div class="pct mono ${gainClass}">${t.invested > 0 ? fmtPct(t.pct) : ''}</div>
      </div>
    </div>
    ${t.unknown ? '<div class="price-updated">* فيه '+t.unknown+' قطعة سعر عيارها لسه فاضي تحت</div>' : ''}
    </section>
  `;

  // Realized gains strip (only if something was sold)
  const realized = computeRealized();
  if(realized.count > 0){
    const rClass = realized.gain > 0 ? 'gain' : (realized.gain < 0 ? 'loss' : '');
    const rSign = realized.gain > 0 ? '+' : '';
    html += `
      <div class="hero-card" style="margin-top:12px; grid-template-columns:repeat(2,1fr);">
        <div class="hero-stat">
          <div class="label">مكسب/خسارة محقق من البيع (${realized.count})</div>
          <div class="value mono ${rClass}">${rSign}${fmt(realized.gain)} <span style="font-size:13px">ج.م</span></div>
        </div>
        <div class="hero-stat">
          <div class="label">نسبة المكسب المحقق</div>
          <div class="value mono ${rClass}">${fmtPct(realized.pct)}</div>
        </div>
      </div>
    `;
  }

  // Price panel
  html += `
    <section>
      <div class="section-title">سعر الجرام دلوقتي</div>
      ${currentUser && currentUser.uid === OWNER_UID ? `
        <div class="price-panel" style="grid-template-columns:1fr;">
          <div class="price-input">
            <label>عيار 24 (السعر الأساسي — إنت بس اللي تقدر تغيّره)</label>
            <div class="row">
              <input class="mono" type="number" inputmode="decimal" placeholder="٠" value="${prices[24] ?? ''}" data-karat="24" onchange="onPriceChange(event)">
              <span class="unit">ج.م / جرام</span>
            </div>
          </div>
        </div>
      ` : `
        <div class="derived-chip" style="text-align:center; padding:14px;">
          <div class="k">عيار 24</div>
          <div class="v" style="font-size:20px;">${prices[24] ? fmt2(prices[24]) : '—'} <span style="font-size:12px;">ج.م/جم</span></div>
        </div>
      `}
      <div class="derived-row">
        <div class="derived-chip">
          <div class="k">عيار 21</div>
          <div class="v">${currentPriceFor(21) !== null ? fmt2(currentPriceFor(21)) : '—'}</div>
        </div>
        <div class="derived-chip">
          <div class="k">عيار 18</div>
          <div class="v">${currentPriceFor(18) !== null ? fmt2(currentPriceFor(18)) : '—'}</div>
        </div>
      </div>
      <div class="price-updated">${timeAgo(prices.updatedAt)}</div>
    </section>
  `;

  // Add form
  html += `
    <section id="add-section">
      <div class="section-title">تسجيل قطعة جديدة</div>
      <form class="add-form" onsubmit="onAddItem(event)">
        <div class="field full">
          <label>اسم القطعة</label>
          <input type="text" id="f-name" placeholder="مثلاً: سبيكة، خاتم أمي، غويشة العيد" required>
        </div>
        <div class="field">
          <label>الوزن (جرام)</label>
          <input class="mono" type="number" step="0.01" min="0" id="f-weight" placeholder="٠٫٠٠" required>
        </div>
        <div class="field">
          <label>العيار</label>
          <select class="mono" id="f-karat">
            ${KARATS.map(k=>`<option value="${k}">${k}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>اتشرى بكام (إجمالي)</label>
          <input class="mono" type="number" step="1" min="0" id="f-price" placeholder="ج.م" required>
        </div>
        <div class="field">
          <label>إمتى</label>
          <input class="mono" type="date" id="f-date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <button class="submit-btn" type="submit">إضافة للدفتر</button>
      </form>
    </section>
  `;

  // Items list (active only)
  const activeItems = items.filter(it=>!it.sold);
  const soldItems = items.filter(it=>it.sold);

  html += `<section><div class="section-title">اللي عندك (${activeItems.length})</div>`;
  if(activeItems.length === 0){
    html += `<div class="empty"><div class="big">الدفتر لسه فاضي</div>سجّل أول قطعة دهب عندك من الفورم اللي فوق</div>`;
  } else {
    html += `<div class="items">`;
    activeItems.slice().reverse().forEach(it=>{
      const p = currentPriceFor(it.karat);
      const curVal = p !== null ? p * it.weight : null;
      const delta = curVal !== null ? curVal - it.purchasePrice : null;
      const deltaPct = (delta !== null && it.purchasePrice > 0) ? (delta / it.purchasePrice) * 100 : null;
      const dClass = delta === null ? '' : (delta > 0 ? 'gain' : (delta < 0 ? 'loss' : ''));
      const dSign = delta !== null && delta > 0 ? '+' : '';

      if(sellingId === it.id){
        html += `
          <div class="item-card" style="flex-wrap:wrap;">
            <div class="stamp"><span class="k">${it.karat}</span></div>
            <div class="item-body">
              <div class="item-name">تسجيل بيع: ${escapeHtml(it.name)}</div>
              <div class="item-meta">القيمة الحالية المقترحة: ${curVal !== null ? fmt(curVal)+' ج.م' : '—'}</div>
            </div>
            <div class="full" style="flex-basis:100%; display:flex; gap:8px; margin-top:10px;">
              <input class="mono" style="flex:1; background:var(--ink); border:1px solid var(--line); border-radius:10px; padding:9px 10px; color:var(--parchment);" type="number" id="sell-price-${it.id}" placeholder="اتباعت بكام">
              <input class="mono" style="background:var(--ink); border:1px solid var(--line); border-radius:10px; padding:9px 10px; color:var(--parchment);" type="date" id="sell-date-${it.id}" value="${new Date().toISOString().slice(0,10)}">
              <button class="submit-btn" style="flex:0 0 auto; padding:9px 16px;" onclick="onConfirmSell('${it.id}')">تأكيد</button>
              <button class="del-btn" onclick="onCancelSell()">إلغاء</button>
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="item-card">
            <div class="stamp"><span class="k">${it.karat}</span></div>
            <div class="item-body">
              <div class="item-name">${escapeHtml(it.name)}</div>
              <div class="item-meta">${it.weight} جم · عيار ${it.karat} · اشتُريت بـ ${fmt(it.purchasePrice)} ج.م ${it.date ? '· ' + it.date : ''}</div>
            </div>
            <div class="item-numbers">
              <div class="current">${curVal !== null ? fmt(curVal)+' ج.م' : '—'}</div>
              <div class="delta ${dClass}">${delta !== null ? dSign+fmt(delta)+' ج.م' : 'محتاج سعر العيار'}</div>
              ${deltaPct !== null ? `<div class="delta ${dClass}" style="opacity:.8">${fmtPct(deltaPct)}</div>` : ''}
            </div>
            <button class="del-btn sell-btn" title="تسجيل بيع" onclick="onStartSell('${it.id}')" style="font-size:13px;">بيع</button>
            <button class="del-btn" title="حذف" onclick="onDeleteItem('${it.id}')">✕</button>
          </div>
        `;
      }
    });
    html += `</div>`;
  }
  html += `</section>`;

  // Sold items
  if(soldItems.length > 0){
    html += `<section><div class="section-title">قطع اتباعت (${soldItems.length})</div><div class="items">`;
    soldItems.slice().reverse().forEach(it=>{
      const gain = it.sold.price - it.purchasePrice;
      const pct = it.purchasePrice > 0 ? (gain/it.purchasePrice)*100 : 0;
      const dClass = gain > 0 ? 'gain' : (gain < 0 ? 'loss' : '');
      const dSign = gain > 0 ? '+' : '';
      html += `
        <div class="item-card" style="opacity:.8;">
          <div class="stamp" style="filter:grayscale(.4);"><span class="k">${it.karat}</span></div>
          <div class="item-body">
            <div class="item-name">${escapeHtml(it.name)}</div>
            <div class="item-meta">اشتُريت بـ ${fmt(it.purchasePrice)} ج.م · اتباعت بـ ${fmt(it.sold.price)} ج.م ${it.sold.date ? '· ' + it.sold.date : ''}</div>
          </div>
          <div class="item-numbers">
            <div class="delta ${dClass}">${dSign}${fmt(gain)} ج.م</div>
            <div class="delta ${dClass}" style="opacity:.8">${fmtPct(pct)}</div>
          </div>
          <button class="del-btn" title="حذف نهائي" onclick="onDeleteItem('${it.id}')">✕</button>
        </div>
      `;
    });
    html += `</div></section>`;
  }

  app.innerHTML = html;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function onPriceChange(e){
  if(!currentUser || currentUser.uid !== OWNER_UID) return;
  const k = e.target.dataset.karat;
  prices[k] = e.target.value;
  prices.updatedAt = new Date().toISOString();
  snapshotPriceHistory();
  persistPrice();
  render();
}

function onAddItem(e){
  e.preventDefault();
  const name = document.getElementById('f-name').value.trim();
  const weight = parseFloat(document.getElementById('f-weight').value);
  const karat = parseInt(document.getElementById('f-karat').value);
  const purchasePrice = parseFloat(document.getElementById('f-price').value);
  const date = document.getElementById('f-date').value;
  if(!name || !weight || !purchasePrice) return;
  items.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    name, weight, karat, purchasePrice, date
  });
  snapshotHistory();
  persist();
  render();
}

function onDeleteItem(id){
  items = items.filter(it => it.id !== id);
  snapshotHistory();
  persist();
  render();
}

function onStartSell(id){
  sellingId = id;
  render();
}
function onCancelSell(){
  sellingId = null;
  render();
}
function onConfirmSell(id){
  const priceInput = document.getElementById('sell-price-'+id);
  const dateInput = document.getElementById('sell-date-'+id);
  const salePrice = parseFloat(priceInput.value);
  if(!salePrice || salePrice <= 0) return;
  const it = items.find(i => i.id === id);
  if(!it) return;
  it.sold = { price: salePrice, date: dateInput.value || new Date().toISOString().slice(0,10) };
  sellingId = null;
  snapshotHistory();
  persist();
  render();
}
</script>
</body>
</html>
